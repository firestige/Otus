apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - daemonset.yaml
  - service.yaml

# Common labels applied to every resource generated from this base.
commonLabels:
  app.kubernetes.io/name: capture-agent
  app.kubernetes.io/managed-by: kustomize
