apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: capture-agent
  namespace: monitoring
  labels:
    app.kubernetes.io/name: capture-agent
    app.kubernetes.io/component: daemonset
  annotations:
    # Rolling update annotation used by Prometheus SD
    prometheus.io/scrape: "true"
    prometheus.io/port: "9091"
    prometheus.io/path: "/metrics"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: capture-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: capture-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: capture-agent

      # Use the host's network namespace so capture-agent can see all node
      # interfaces and their traffic.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      # Tolerate master/control-plane nodes when capture is needed cluster-wide.
      # Remove or narrow this if you only want nodes with a specific label.
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule

      # Only schedule on nodes labelled capture-agent-enabled=true.
      # Add the label with: kubectl label node <node> capture-agent-enabled=true
      # Remove nodeSelector entirely to deploy on every node.
      nodeSelector:
        capture-agent-enabled: "true"

      # Prefer spreading pods across failure domains
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: capture-agent

      initContainers:
        # Ensure host data directories exist before the main container starts.
        - name: init-dirs
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /host-data/capture-agent/tasks
              chmod 750 /host-data/capture-agent
          volumeMounts:
            - name: host-var-lib
              mountPath: /host-data

      containers:
        - name: capture-agent
          # Image is overridden per overlay; base uses the sidecar image.
          image: capture-agent-sidecar:latest
          imagePullPolicy: IfNotPresent

          # Override the entrypoint to pass the config path explicitly.
          env:
            - name: CONFIG_FILE
              value: /etc/capture-agent/config.yml
            # Expose the Kubernetes node name for log enrichment.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          ports:
            - name: metrics
              containerPort: 9091
              hostPort: 9091
              protocol: TCP

          # ── Security context ────────────────────────────────────────────
          # We need raw-socket access for packet capture.
          # Use the minimal capabilities instead of privileged: true where PSP/SCC allows it.
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            privileged: false             # set to true if your cluster policy requires it
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - NET_RAW
                - NET_ADMIN
              drop:
                - ALL

          # ── Resource requests / limits ──────────────────────────────────
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

          # ── Volume mounts ────────────────────────────────────────────────
          volumeMounts:
            - name: config
              mountPath: /etc/capture-agent
              readOnly: true
            - name: data
              mountPath: /var/lib/capture-agent
            - name: logs
              mountPath: /var/log/capture-agent

          # ── Health checks ────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /metrics
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3

      volumes:
        - name: config
          configMap:
            name: capture-agent-config
        - name: data
          hostPath:
            path: /var/lib/capture-agent
            type: DirectoryOrCreate
        - name: logs
          hostPath:
            path: /var/log/capture-agent
            type: DirectoryOrCreate
        - name: host-var-lib
          hostPath:
            path: /var/lib
            type: Directory
